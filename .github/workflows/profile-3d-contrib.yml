name: GitHub-Profile-3D-Contrib

on:
  schedule: # Berjalan otomatis setiap jam 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Memungkinkan kamu menjalankan manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      - uses: yuzutech/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Generated 3D Profile Contrib" || exit 0
          git push
