name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 0 * * *" # Jalan otomatis setiap hari jam 12 malam
  workflow_dispatch: # Supaya bisa kamu klik "Run" manual kapan saja

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate 3D Contribution Graph
        uses: jasonwebb/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          # Membuat folder jika belum ada (sesuai path di README kamu)
          mkdir -p profile-3d-contrib 
          # Pindahkan file hasil generate ke folder tujuan
          mv profile-3d-contrib/* profile-3d-contrib/ 2>/dev/null || true
          git add -A .
          git commit -m "chore: update 3d contribution graph" || exit 0
          git push
